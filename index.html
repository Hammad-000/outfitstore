<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clothes Store</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-950 via-indigo-950 to-blue-900 min-h-screen text-white">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 backdrop-blur-2xl bg-white/5 border-b border-white/10 shadow-[0_8px_32px_rgba(0,0,0,0.37)]">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between flex-wrap gap-4">

      <!-- Logo -->
      <h1
        class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent tracking-wide">
        Outfit 🛍️
      </h1>

      <!-- Mobile Button -->
      <button id="menuToggle"
        class="md:hidden text-3xl text-white hover:text-cyan-300 transition duration-300">
        ☰
      </button>

      <!-- Menu -->
      <div id="menuContent"
        class="hidden md:flex flex-col md:flex-row md:items-center gap-5 w-full md:w-auto mt-4 md:mt-0">

        <!-- Filters -->
        <div class="flex flex-wrap items-center gap-4">

          <label
            class="flex items-center gap-2 bg-white/10 px-3 py-2 rounded-xl hover:bg-white/20 transition cursor-pointer">
            <input type="checkbox" id="hoodie" class="accent-cyan-400 scale-110">
            <span>Hoodie</span>
          </label>

          <label
            class="flex items-center gap-2 bg-white/10 px-3 py-2 rounded-xl hover:bg-white/20 transition cursor-pointer">
            <input type="checkbox" id="kurta" class="accent-cyan-400 scale-110">
            <span>Kurta</span>
          </label>

          <label
            class="flex items-center gap-2 bg-white/10 px-3 py-2 rounded-xl hover:bg-white/20 transition cursor-pointer">
            <input type="checkbox" id="perfume" class="accent-cyan-400 scale-110">
            <span>Perfume</span>
          </label>

          <label
            class="flex items-center gap-2 bg-white/10 px-3 py-2 rounded-xl hover:bg-white/20 transition cursor-pointer">
            <input type="checkbox" id="shirt" class="accent-cyan-400 scale-110">
            <span>Shirt</span>
          </label>

          <label
            class="flex items-center gap-2 bg-white/10 px-3 py-2 rounded-xl hover:bg-white/20 transition cursor-pointer">
            <input type="checkbox" id="pant" class="accent-cyan-400 scale-110">
            <span>Pants</span>
          </label>
        </div>

        <!-- Search -->
        <div
          class="flex items-center bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl px-4 py-2 w-full md:w-72 shadow-md">

          <input type="search" id="search" placeholder="Search products..."
            class="bg-transparent outline-none w-full placeholder:text-gray-300 text-white">

          <span class="text-gray-300 text-lg">🔍</span>
        </div>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-6 py-10">

    <!-- Heading -->
    <div class="mb-10">
      <h2 class="text-5xl font-bold mb-3">
        👋 Welcome to
        <span
          class="bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent">
          Outfit Store
        </span>
      </h2>

      <p class="text-gray-300 text-lg">
        Explore premium fashion collections with modern styles.
      </p>  
    </div>

    <!-- Cards -->
    <div id="cardsContainer"
      class="grid grid-row-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">

    </div>

<div class="flex items-center justify-center gap-3 p-6">

  <button
    class=" btn-1 flex items-center justify-center w-11 h-11 rounded-full 
           bg-white shadow-md border border-gray-200
           text-gray-700 hover:bg-gray-100 hover:scale-105
           transition-all duration-200 cursor-pointer "
  >
    <span class="text-xl font-bold ">‹</span>
  </button>
  

  <button
    class=" btn-2 w-11 h-11 rounded-full bg-indigo-600 text-white
           font-semibold shadow-lg hover:bg-indigo-700
           transition-all duration-200 cursor-pointer"
  >
    1
  </button>

  <button
    class=" btn-3 w-11 h-11 rounded-full bg-white text-gray-700
           border border-gray-200 shadow-md
           hover:bg-gray-100 transition-all duration-200 cursor-pointer "
  >
    2
  </button>

  <button
    class=" btn-4 w-11 h-11 rounded-full bg-white text-gray-700
           border border-gray-200 shadow-md
           hover:bg-gray-100 transition-all duration-200 cursor-pointer "
  >
    3
  </button>

<button
  class="btn-next flex items-center justify-center w-11 h-11 rounded-full 
         bg-white shadow-md border border-gray-200
         text-gray-700 hover:bg-gray-100 hover:scale-105
         transition-all duration-200 cursor-pointer "
>
  <span class="text-xl font-bold cursor-pointer ">›</span>
</button>

</div>
  </main>

  <footer class="bg-white/5 backdrop-blur-2xl border-t border-white/10 mt-10">
  <div class="max-w-7xl mx-auto px-6 py-12 text-center text-gray-300">

    <h3 class="text-2xl font-bold mb-4 bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent">
      Outfit Store
    </h3>

    <p class="mb-6 text-gray-400">
      Premium fashion collections delivered right to your doorstep. Style meets comfort.
    </p>

    <div class="flex justify-center gap-6 mb-6">
      <a href="#" class="hover:text-cyan-400 transition">Home</a>
      <a href="#" class="hover:text-cyan-400 transition">Shop</a>
      <a href="#" class="hover:text-cyan-400 transition">About</a>
      <a href="#" class="hover:text-cyan-400 transition">Contact</a>
    </div>

    <p class="text-gray-500 text-sm">
      &copy; 2026 Outfit Store. All rights reserved.
    </p>

  </div>
</footer>

  <script type="module" src="script.js"></script>

</html>
