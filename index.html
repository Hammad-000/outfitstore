<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clothes Store</title>
  <link href="./src/output.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

</head>
<body class= " bg-gradient-to-tl from-black to-blue-500 text-gray-900  font-stretch-95% ">


<nav class="bg-gradient-to-l accent-indigo-500  to to-gray-600 shadow p-4 sticky top-0 z-10">
  <div class="max-w-7xl mx-auto flex items-center justify-between gap-4 flex-wrap">

    
    <h1 class="text-2xl font-semibold text-gray-800">Outfit 🛍️</h1>

    <button id="menuToggle" class="md:hidden text-3xl text-white focus:outline-none">
      ☰
    </button>

    <div id="menuContent" class="w-full mt-4 md:mt-0 hidden md:flex md:items-center md:gap-4 md:w-auto flex-col md:flex-row">

   
      <div id="checkboxes" class="flex items-center gap-4 flex-wrap mb-4 md:mb-0">
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="hoodie" class="accent-indigo-600">
          <span>Hoodie</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="kurta" class="accent-indigo-600">
          <span>Kurta</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="perfume" class="accent-indigo-600">
          <span>Perfume</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="shirt" class="accent-indigo-600">
          <span>Shirt</span>
        </label>
        <label class="flex items-center gap-1 cursor-pointer">
          <input type="checkbox" id="pant" class="accent-indigo-600">
          <span>Pants</span>
        </label>
      </div>

      
      <div class="flex items-center bg-gray-200 rounded-lg px-1 py-1 w-full md:w-64 ">
        <input  type="search" id="search"  placeholder="Search by title...."
          class="bg-transparent p-1 rounded focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none w-full text-gray-700">
      </div>
    </div>
  </div>
</nav>


  <main class="max-w-7xl mx-auto p-6">
    <h2 class="text-3xl font-semibold mb-6 text-gray-800"> 👋 Welcome</h2>

    
    <div id="cardsContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 ">

    </div>

  </main>
  

  <script src="./script.js"></script>
</body>
</html>
